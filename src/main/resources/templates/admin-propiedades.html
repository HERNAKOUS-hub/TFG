<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Panel de Administración - LocoBrick</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-danger sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-shield-lock-fill"></i> LocoBrick ADMIN
            </a>
            <div class="d-flex gap-3">
                <a href="/catalogo" class="btn btn-outline-light btn-sm">Ver Web Pública</a>
                <a href="/logout" class="btn btn-dark btn-sm">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">

        <div th:if="${param.exito}" class="alert alert-success alert-dismissible fade show">
            ¡Propiedad guardada correctamente!
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${param.borrado}" class="alert alert-warning alert-dismissible fade show">
            Propiedad eliminada de la base de datos.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white fw-bold">
                        <i class="bi bi-plus-circle"></i> Nueva Propiedad
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/propiedades/guardar}" th:object="${nuevaPropiedad}" method="post">

                            <div class="mb-3">
                                <label class="form-label small fw-bold">Nombre</label>
                                <input type="text" th:field="*{name}" class="form-control" placeholder="Ej: Ático Lujo"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold">Zona</label>
                                <select th:field="*{zona}" class="form-select" required>
                                    <option value="">Selecciona Ubicación...</option>
                                    <option th:each="z : ${zonas}" th:value="${z.zoneID}"
                                        th:text="${z.city + ' - ' + z.district}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold">Valor (€)</label>
                                <input type="number" th:field="*{value}" class="form-control" placeholder="0.00"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold">Estado</label>
                                <select th:field="*{status}" class="form-select">
                                    <option value="Disponible">Disponible</option>
                                    <option value="En gestión">En gestión</option>
                                    <option value="Arrendada">Arrendada</option>
                                    <option value="Vendido">Vendido</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold">Descripción</label>
                                <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                            </div>

                            <button type="submit" class="btn btn-success w-100 fw-bold">Guardar en Base de
                                Datos</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-white fw-bold">
                        <i class="bi bi-list-ul"></i> Inventario Actual
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Zona</th>
                                    <th>Valor</th>
                                    <th>Estado</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="p : ${propiedades}">
                                    <td class="text-muted small" th:text="${p.propertyID}">1</td>
                                    <td class="fw-bold" th:text="${p.name}">Casa</td>
                                    <td th:text="${p.zona.city}">Madrid</td>
                                    <td th:text="${#numbers.formatDecimal(p.value, 0, 'POINT', 0, 'COMMA') + '€'}">100€
                                    </td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${p.status == 'Disponible' ? 'bg-success' : 'bg-warning text-dark'}"
                                            th:text="${p.status}">Estado</span>
                                    </td>
                                    <td>
                                        <a th:href="@{/admin/propiedades/eliminar/{id}(id=${p.propertyID})}"
                                            class="btn btn-danger btn-sm"
                                            onclick="return confirm('¿Seguro que quieres borrar esta propiedad permanentemente?');">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
