<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña - LocoBrick</title>
    <link rel="icon" type="image/png" th:href="@{/images/Ladrillo.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --color-principal: #FB6222;
            --color-hover: #FFC107;
            --fuente-fintech: 'Inter', sans-serif;
        }

        body {
            font-family: var(--fuente-fintech);
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #f1f5f9;
        }

        .btn-principal {
            background-color: var(--color-principal);
            color: white;
            font-weight: 700;
            padding: 12px;
            border-radius: 8px;
            border: none;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-principal:hover {
            background-color: var(--color-hover);
            color: #111827;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 193, 7, 0.3);
        }

        .form-control {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 12px 15px;
        }

        .form-control:focus {
            border-color: var(--color-principal);
            box-shadow: 0 0 0 0.25rem rgba(251, 98, 34, 0.25);
        }
    </style>
</head>

<body>
    <div class="auth-card text-center">
        <a href="/">
            <img th:src="@{/images/LocoBrick.png}" alt="LocoBrick Logo" style="height: 45px; margin-bottom: 25px;">
        </a>
        
        <h4 class="fw-bold mb-2">¿Has olvidado tu contraseña?</h4>
        <p class="text-muted small mb-4">Introduce el correo electrónico con el que te registraste y te enviaremos un enlace seguro para crear una nueva.</p>

        <form action="/recuperar-password" method="post">
            <div class="mb-4 text-start">
                <label for="email" class="form-label fw-bold small text-secondary">Correo Electrónico</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
                    <input type="email" class="form-control" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>
            </div>

            <button type="submit" class="btn btn-principal shadow-sm mb-3">Enviar enlace de recuperación</button>
        </form>

        <a href="/login" class="text-decoration-none text-muted small fw-bold">← Volver al inicio de sesión</a>
    </div>
</body>
</html>
