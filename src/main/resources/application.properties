spring.application.name=locobrick
server.port=8080

# =================================
# 1. CONEXIÓN BASE DE DATOS (XAMPP)
# =================================
spring.datasource.url=jdbc:mysql://localhost:3306/LocoBrick_DB?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=locobrick
spring.datasource.password=locobrick
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =================================
# 2. JPA / HIBERNATE
# =================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Quita el WARN "spring.jpa.open-in-view is enabled by default" de la consola
spring.jpa.open-in-view=false

# ================================
# 2.5. CARGA DE DATOS INICIALES
# ================================
spring.sql.init.mode=never

# =================================
# 3. THYMELEAF & WEB
# =================================
spring.thymeleaf.cache=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =================================
# 4. CONFIGURACIÓN DE CORREO (GMAIL)
# =================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Datos de tu cuenta oficial
