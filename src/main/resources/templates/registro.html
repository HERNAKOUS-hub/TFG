<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Registro - LocoBrick</title>
    <link rel="icon" type="image/png" th:href="@{/images/Ladrillo.png}">
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-blanco: #FFFFFF;
            --color-negro: #212529;
            --color-gris: #6c757d;
            --color-locobrick: #FB6222;
            --color-hover: #e0a800;
            --fuente-titulos: 'Poppins', sans-serif;
            --fuente-textos: 'Open Sans', sans-serif;
        }

        body {
            font-family: var(--fuente-textos);
            background-color: #F4F5F7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 0;
        }

        .contenedor-formulario {
            background-color: var(--color-blanco);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
            animation: aparecerSuave 0.6s ease-out forwards;
        }

        @keyframes aparecerSuave {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-img {
            height: 60px;
            margin-bottom: 10px;
        }

        h3 {
            font-family: var(--fuente-titulos);
            color: var(--color-negro);
            margin-bottom: 5px;
            font-weight: 700;
        }

        .subtitulo {
            color: var(--color-gris);
            margin-bottom: 2rem;
            font-size: 14px;
        }

        .grupo-input {
            position: relative;
            margin-bottom: 2rem;
            text-align: left;
        }

        .fila-doble {
            display: flex;
            gap: 1rem;
        }

        .fila-doble .grupo-input {
            width: 50%;
        }

        .input-flotante {
            width: 100%;
            padding: 10px 0;
            font-size: 16px;
            color: var(--color-negro);
            background-color: transparent;
            border: none;
            border-bottom: 2px solid #ccc;
            outline: none;
            transition: border-color 0.3s ease;
            font-family: var(--fuente-textos);
        }

        .label-flotante {
            position: absolute;
            top: 10px;
            left: 0;
            color: #999;
            font-size: 16px;
            pointer-events: none;
            transition: 0.3s ease all;
        }

        .input-flotante:focus~.label-flotante,
        .input-flotante:not(:placeholder-shown)~.label-flotante {
            top: -20px;
            font-size: 13px;
            color: var(--color-locobrick);
            font-weight: 600;
        }

        .input-flotante:focus {
            border-bottom: 2px solid var(--color-locobrick);
        }

        .btn-enviar {
            background-color: var(--color-locobrick);
            color: var(--color-negro);
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            font-family: var(--fuente-titulos);
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }

        .btn-enviar:hover {
            background-color: var(--color-hover);
        }

        .btn-enviar:active {
            transform: scale(0.98);
        }

        .enlaces {
            margin-top: 1rem;
            font-size: 14px;
        }

        .enlaces a {
            color: var(--color-negro);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .enlaces a:hover {
            color: var(--color-locobrick);
        }

        .separador {
            margin: 1.5rem 0;
            border-top: 1px solid #eee;
        }

        .alerta {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 14px;
            font-weight: 600;
        }

        .alerta-roja {
            background-color: #ffebee;
            color: #c62828;
        }
    </style>
</head>

                <div class="grupo-input">

                </div>
            </div>

            <div class="grupo-input">

            </div>

            <div class="grupo-input">
                <input type="text" th:field="*{dni}" id="dni" class="input-flotante" required placeholder=" "

            </div>

            <div class="fila-doble">

                    <input type="text" id="via" class="input-flotante" required placeholder=" " name="via">
                    <label for="via" class="label-flotante">Nombre de la Vía (Calle, Av, Plaza...)</label>
                </div>
                <div class="grupo-input" style="width: 30%;">
                    <input type="text" id="numero" class="input-flotante" required placeholder=" " name="numero">
                    <label for="numero" class="label-flotante">Nº</label>
                </div>
            </div>

            <div class="fila-doble">
                <div class="grupo-input">
                    <input type="text" id="piso" class="input-flotante" placeholder=" " name="piso">
                    <label for="piso" class="label-flotante">Piso / Puerta</label>
                </div>
                <div class="grupo-input">
                    <input type="text" id="cp" class="input-flotante" required placeholder=" " name="cp"
                        pattern="\d{5,10}">
                    <label for="cp" class="label-flotante">Cód. Postal</label>
                </div>
            </div>

            <div class="fila-doble">
                <div class="grupo-input">
                    <input type="text" id="ciudad" class="input-flotante" required placeholder=" " name="ciudad">
                    <label for="ciudad" class="label-flotante">Ciudad</label>

                <div class="grupo-input">
